<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Ventures</title>
<button
    onclick="logout()"
    class="btn">

    Logout

</button>
    <link rel="stylesheet"
          href="../css/style.css">

</head>
<body>

<div class="container">

    <h1>
        Venture Manager
    </h1>

    <form id="venture-form">

        <input
            type="text"
            id="venture-name"
            placeholder="Venture Name"
            required>

        <input
            type="text"
            id="venture-slug"
            placeholder="venture-slug"
            required>

        <textarea
            id="venture-description"
            placeholder="Description"></textarea>

        <input
            type="text"
            id="venture-website"
            placeholder="Website URL">

        <input
            type="text"
            id="venture-logo"
            placeholder="Logo URL">

        <label>

            <input
                type="checkbox"
                id="venture-featured">

            Featured

        </label>

        <button
            type="submit">

            Add Venture

        </button>

    </form>

    <hr>

    <div id="admin-ventures">

        Loading...

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="../js/app.js"></script>

</body>
</html>
