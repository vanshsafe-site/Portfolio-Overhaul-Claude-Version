<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Login</title>

    <link rel="stylesheet"
          href="../css/style.css">

</head>
<body>

<div class="container">

    <h1>
        Admin Login
    </h1>

    <form id="login-form">

        <input
            type="email"
            id="login-email"
            placeholder="Email"
            required>

        <input
            type="password"
            id="login-password"
            placeholder="Password"
            required>

        <button type="submit">

            Login

        </button>

    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/app.js"></script>

</body>
</html>
