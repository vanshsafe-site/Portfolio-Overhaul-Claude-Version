<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Dashboard</title>

    <link rel="stylesheet"
          href="../css/style.css">

</head>
<body>

<header>

    <div style="
    display:flex;
    justify-content:space-between;
    align-items:center;
">

    <h1>
        Portfolio Admin
    </h1>

    <button
        onclick="logout()"
        class="btn">

        Logout

    </button>

</div>

</header>

<main class="container">

    <h2>
        Dashboard
    </h2>

    <p>
        Manage your portfolio content.
    </p>

    <div class="grid">

        <a
            href="projects.html"
            style="text-decoration:none;color:inherit;">

            <div class="card">

                <h3>
                    Projects
                </h3>

                <h2 id="projects-count">
                    0
                </h2>

                <p>
                    Click to manage projects
                </p>

            </div>

        </a>

        <a
            href="ventures.html"
            style="text-decoration:none;color:inherit;">

            <div class="card">

                <h3>
                    Ventures
                </h3>

                <h2 id="ventures-count">
                    0
                </h2>

                <p>
                    Click to manage ventures
                </p>

            </div>

        </a>

        <a
            href="achievements.html"
            style="text-decoration:none;color:inherit;">

            <div class="card">

                <h3>
                    Achievements
                </h3>

                <h2 id="achievements-count">
                    0
                </h2>

                <p>
                    Click to manage achievements
                </p>

            </div>

        </a>

    </div>

</main>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="../js/app.js"></script>

</body>
</html>
